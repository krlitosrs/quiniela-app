<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quiniela Mundial</title>

<style>
body { font-family: Arial; background:#0f0f0f; color:white; margin:0; }
h1 { text-align:center; margin:20px 0; }

.pantalla {
  display:none;
  max-width:1000px;
  margin:20px auto;
  padding:20px;
  background:#1a1a1a;
  border-radius:10px;
}

.menu { text-align:center; margin-bottom:15px; }

button {
  margin:5px;
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

input {
  padding:6px;
  margin:3px;
  text-align:center;
}

table {
  width:100%;
  border-collapse:collapse;
}

td, th {
  padding:8px;
  border-bottom:1px solid #333;
  text-align:center;
}

/* NUEVO DISEÑO PARTIDOS */
.partido-card {
  background: #222;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 12px;
}

.partido-header {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #aaa;
  margin-bottom: 8px;
}

.partido-body {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.equipo {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 30%;
}

.equipo img {
  width: 24px;
}

.marcador {
  display: flex;
  align-items: center;
  gap: 5px;
}

.marcador input {
  width: 40px;
  font-size: 16px;
}

.cerrado {
  text-align: center;
  color: red;
  margin-top: 5px;
  font-size: 12px;
}
</style>
</head>

<body>

<h1>Quiniela Mundial</h1>

<div id="pantallaLogin" class="pantalla">
  <input id="email" placeholder="Correo"><br>
  <input id="password" type="password" placeholder="Contraseña"><br>
  <button onclick="registrar()">Registrarse</button>
  <button onclick="login()">Entrar</button>
</div>

<div id="pantallaNickname" class="pantalla">
  <input id="nickname" placeholder="Nickname">
  <button onclick="guardarNickname()">Guardar</button>
</div>

<div id="pantallaApp" class="pantalla">

  <div class="menu">
    <button onclick="mostrarVista('predicciones')">Predicciones</button>
    <button onclick="mostrarVista('ranking')">Ranking</button>
    <button onclick="mostrarVista('misResultados')">Mis Resultados</button>
    <button onclick="mostrarVista('grupos')">Grupos</button>
    <button onclick="logout()">Salir</button>
  </div>

  <div id="vistaPredicciones">
    <div id="partidos"></div>
    <button onclick="guardarPredicciones()">Guardar</button>
  </div>

  <div id="vistaRanking" style="display:none">
    <div id="ranking"></div>
  </div>

  <div id="vistaMisResultados" style="display:none">
    <div id="misResultados"></div>
  </div>

  <div id="vistaGrupos" style="display:none">
    <div id="tablaGrupos"></div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script src="script.js"></script>
</body>
</html>
