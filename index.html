<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Quiniela Mundial</title>

  <style>
    body { font-family: Arial; background:#111; color:white; padding:20px; }
    input, button { margin:5px; padding:6px; }
    table { width:100%; border-collapse: collapse; margin-top:10px; }
    th, td { padding:8px; text-align:center; }
    .pantalla { display:none; }
    .menu button { margin:5px; }
  </style>
</head>
<body>

<h1>Quiniela Mundial</h1>

<!-- LOGIN -->
<div id="pantallaLogin" class="pantalla">
  <h2>Login</h2>
  <input type="email" id="email" placeholder="Correo">
  <input type="password" id="password" placeholder="Contraseña"><br>
  <button onclick="registrar()">Registrarse</button>
  <button onclick="login()">Iniciar sesión</button>
</div>

<!-- NICKNAME -->
<div id="pantallaNickname" class="pantalla">
  <h2>Crea tu Nickname</h2>
  <input type="text" id="nickname" placeholder="Nickname">
  <button onclick="guardarNickname()">Guardar</button>
</div>

<!-- APP -->
<div id="pantallaApp" class="pantalla">

  <div class="menu">
    <button onclick="mostrarVista('predicciones')">Predicciones</button>
    <button onclick="mostrarVista('ranking')">Ranking</button>
    <button onclick="mostrarVista('misResultados')">Mis Resultados</button>
    <button onclick="logout()">Salir</button>
  </div>

  <!-- PREDICCIONES -->
  <div id="vistaPredicciones">
    <h2>Predicciones</h2>
    <div id="partidos"></div>
    <button onclick="guardarPredicciones()">Guardar</button>
  </div>

  <!-- RANKING -->
  <div id="vistaRanking" style="display:none">
    <h2>Ranking</h2>
    <div id="ranking"></div>
  </div>

  <!-- MIS RESULTADOS -->
  <div id="vistaMisResultados" style="display:none">
    <h2>Mis Resultados</h2>
    <div id="misResultados"></div>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script src="script.js"></script>

</body>
</html>
